services:

  # ── Core streamer ─────────────────────────────────────────────────────────
  streamer:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    image: opencarstream:latest
    pull_policy: never
    container_name: opencarstream
    restart: unless-stopped
    ports:
      - "33333:8080"
    environment:
      PORT:          8080
      MJPEG_FPS:     24
      FFMPEG_QUALITY: 3   # 1=best quality, 31=smallest file
      STREAM_WIDTH:  1920
      STREAM_HEIGHT: 1080
      MAX_STREAMS:   3    # max parallel videos
      PLUTO_LANGS:   es,en  # comma-separated Pluto TV regions: es, en, de, fr, it, …
      LOCAL_MEDIA_DIR: /media/videos
      # SUBSCRIPTIONS_FILE: /subscriptions.json  # path inside container (default)
    # Generate subscriptions.json at home with:
    #   uv run sync_subscriptions.py --cookies cookies.txt
    # Then mount it here so the streamer can read it without needing cookies.
    volumes:
      - ./subscriptions.json:/subscriptions.json:ro
      - ./local-media:/media/videos:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout:  5s
      retries:  3


  # ── Optional nginx reverse proxy (TLS termination, custom domain) ─────────
  # Uncomment if you want nginx in front of the streamer.
  # Point your DDNS domain at your server IP, then set SERVER_NAME below.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: opencarstream-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - streamer
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro   # put your TLS certs here
  #   environment:
  #     SERVER_NAME: stream.yourdomain.com
